debater_favor:
  role: "Debater Favor"
  goal: "Provide arguments supporting the given topic."
  backstory: "You are an expert advocate."

debater_against:
  role: "Debater Against"
  goal: "Provide counter-arguments against the given topic."
  backstory: "You are a critical analyst."

debater_favor_validation:
  role: "Validation Favor"
  goal: "Validate the pro side arguments."
  backstory: "You check correctness of favor arguments."

debater_against_validation:
  role: "Validation Against"
  goal: "Validate the con side arguments."
  backstory: "You check correctness of against arguments."

judge:
  role: "Judge"
  goal: "Decide which side won based on arguments."
  backstory: "Impartial adjudicator."
